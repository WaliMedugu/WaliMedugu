<svg viewBox="0 0 1000 92" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Section 07 — STACK">
  <style>
    .mono{font-family:"SF Mono",ui-monospace,Menlo,Consolas,"Liberation Mono",monospace}
    .serif{font-family:Georgia,"Times New Roman",serif}
    .draw{stroke:#232220;stroke-width:1;stroke-dasharray:760;stroke-dashoffset:760;animation:d 1.3s cubic-bezier(.6,0,.2,1) .2s forwards}
    @keyframes d{to{stroke-dashoffset:0}}
    .f{opacity:0;animation:f .8s ease .1s forwards}
    @keyframes f{to{opacity:1}}
    .tick{animation:p 2.4s ease-in-out infinite}
    @keyframes p{0%,100%{opacity:1}50%{opacity:.3}}
    @media (prefers-reduced-motion:reduce){.draw,.f,.tick{animation:none}.draw{stroke-dashoffset:0}.f{opacity:1}}
  </style>
  <rect width="1000" height="92" fill="#0B0B0D"/>
  <g class="f">
    <text class="serif" x="48" y="68" font-size="52" fill="#26241F" font-style="italic">07</text>
    <text class="mono tick" x="128" y="58" font-size="14" fill="#C8A84B" letter-spacing="6">STACK</text>
    <text class="mono" x="952" y="58" font-size="11" fill="#5C5A54" letter-spacing="2" text-anchor="end">~/07-stack</text>
  </g>
  <line class="draw" x1="233" y1="53" x2="840" y2="53"/>
</svg>

<svg viewBox="0 0 1000 370" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Experience — Ambian Strategy, VIT SRIP, GeoPacific Solutions, VIT Abuja">
  <style>
    :root { --bone: #444444; --rule: #C0C0C0; --muted: #888888; --dim: #AAAAAA; --accent: #555555; }
    @media (prefers-color-scheme: dark) { :root { --bone: #DDDDDD; --rule: #444444; --muted: #777777; --dim: #666666; --accent: #AAAAAA; } }
    .mono { font-family: ui-monospace, "SFMono-Regular", "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .rise { opacity: 0; animation: rise .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes rise { from { opacity:0;transform:translateY(8px); } to { opacity:1;transform:translateY(0); } }
    .a1{animation-delay:.15s} .a2{animation-delay:.35s} .a3{animation-delay:.55s} .a4{animation-delay:.75s}
    @media (prefers-reduced-motion: reduce) { .rise { animation: none; opacity: 1; } }
      :root { --bone: #000000; --muted: #000000; --dim: #000000; --rule: #000000; --accent: #000000; --node-bg: #FFFFFF; --core-bg: #FFFFFF; }
  :root { --bone:#FFFFFF; --muted:#FFFFFF; --dim:#FFFFFF; --rule:#FFFFFF; --accent:#FFFFFF; --node-bg:#000000; --core-bg:#000000; --ghost:#FFFFFF; --ink:#FFFFFF; --paper:#000000; --ghost:#FFFFFF; }
</style>

  <line x1="120" y1="10" x2="120" y2="360" stroke="var(--rule)" stroke-width="1" opacity=".4"/>

  <g class="rise a1">
    <text class="mono" x="48" y="42"  font-size="12" fill="var(--accent)" letter-spacing="2">2026</text>
    <text class="mono" x="136" y="42"  font-size="15" fill="var(--bone)">Blue Particle Studios · Founder &amp; Lead Coordinator</text>
    <text class="mono" x="136" y="68"  font-size="14" fill="var(--muted)">managing customized, commission-based application pipeline for non-technical clients</text>
    <text class="mono" x="136" y="90"  font-size="14" fill="var(--muted)">built studio site &amp; coordinates product delivery across Core / Foundation / Signature tiers</text>
  </g>

  <g class="rise a2">
    <text class="mono" x="48" y="138" font-size="12" fill="var(--accent)" letter-spacing="2">2026</text>
    <text class="mono" x="136" y="138" font-size="15" fill="var(--bone)">Code Campus (Styclick Application) · Full-Stack Developer Intern</text>
    <text class="mono" x="136" y="164" font-size="14" fill="var(--muted)">specialized in full-stack features &amp; Provider state management for mobile app</text>
    <text class="mono" x="136" y="186" font-size="14" fill="var(--muted)">produced video content and researched converting WordPress site into standalone app</text>
  </g>

  <g class="rise a3">
    <text class="mono" x="48" y="234" font-size="12" fill="var(--accent)" letter-spacing="2">2025</text>
    <text class="mono" x="136" y="234" font-size="15" fill="var(--bone)">FIRS Google Maps Training · Technical Trainer · Lagos</text>
    <text class="mono" x="136" y="260" font-size="14" fill="var(--muted)">conducted instruction program instructing fleet drivers on navigation techniques</text>
    <text class="mono" x="136" y="282" font-size="14" fill="var(--muted)">optimized Lagos-wide navigation layouts, routes, and directory lookup protocols</text>
  </g>

  <g class="rise a4">
    <text class="mono" x="48" y="330" font-size="12" fill="var(--accent)" letter-spacing="2">2024 –</text>
    <text class="mono" x="136" y="330" font-size="15" fill="var(--bone)">Nile University of Nigeria · Software Engineering Track</text>
    <text class="mono" x="136" y="356" font-size="14" fill="var(--muted)">Team Tensor Lead (Winner Wema Bank Hackaholics 6.0 regional finals) · Activism</text>
  </g>
</svg>

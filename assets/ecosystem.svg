<svg viewBox="0 0 1000 580" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="System map: terminal tools, web and data platforms, iOS apps, all from one pipeline">
  <style>
    :root {
      --bone: #1A1A1A; --muted: #666666; --dim: #999999; --rule: #D1D1D1;
      --node-bg: #F7F7F7; --node-bd: #E0E0E0; --core-bg: #EFEFEF; --core-bd: #0D0D0D; --accent: #0D0D0D;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bone: #EFEFEF; --muted: #AAAAAA; --dim: #777777; --rule: #3C3C3C;
        --node-bg: #111111; --node-bd: #3A3A3A; --core-bg: #1A1A1A; --core-bd: #FFFFFF; --accent: #FFFFFF;
      }
    }
    .mono { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .node { fill: var(--node-bg); stroke: var(--node-bd); stroke-width: 1; }
    .nodeC { fill: var(--core-bg); stroke: var(--core-bd); stroke-width: 1.5; }
    .wire { stroke: var(--rule); stroke-width: 1; stroke-dasharray: 500; stroke-dashoffset: 500; animation: draw 1.6s cubic-bezier(.6,0,.2,1) forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .w1{animation-delay:.2s}.w2{animation-delay:.32s}.w3{animation-delay:.44s}.w4{animation-delay:.56s}.w5{animation-delay:.68s}.w6{animation-delay:.8s}.w7{animation-delay:.92s}.w8{animation-delay:1.04s}.w9{animation-delay:1.16s}
    .flow { stroke: var(--muted); stroke-width: 1; opacity: .2; stroke-dasharray: 3 9; animation: march 1.4s linear infinite; }
    @keyframes march { to { stroke-dashoffset: -12; } }
    .pop { opacity: 0; animation: pop .7s cubic-bezier(.2,.7,.2,1) forwards; }
    @keyframes pop { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .p0{animation-delay:.1s}.p1{animation-delay:.9s}.p2{animation-delay:1.0s}.p3{animation-delay:1.1s}.p4{animation-delay:1.2s}.p5{animation-delay:1.3s}.p6{animation-delay:1.4s}.p7{animation-delay:1.5s}.p8{animation-delay:1.6s}.p9{animation-delay:1.7s}.p10{animation-delay:1.9s}
    .core { animation: breathe 3.2s ease-in-out infinite; }
    @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:.55} }
    @media (prefers-reduced-motion: reduce) {
      .wire,.flow,.pop,.core { animation: none; }
      .wire{stroke-dashoffset:0} .pop{opacity:1} .flow{opacity:.1}
    }
  </style>

  <line x1="48" y1="40" x2="952" y2="40" stroke="var(--rule)"/>
  <text fill="var(--muted)" class="mono" x="48" y="28" font-size="11" letter-spacing="3.5">SYSTEM MAP — EVERYTHING FROM ONE PIPELINE</text>
  <text fill="var(--muted)" class="mono" x="952" y="28" font-size="11" letter-spacing="3.5" text-anchor="end">FIG. 01</text>

  <!-- wires -->
  <g>
    <line class="wire w1" x1="500" y1="280" x2="165" y2="165"/>
    <line class="wire w2" x1="500" y1="280" x2="120" y2="295"/>
    <line class="wire w3" x1="500" y1="280" x2="175" y2="415"/>
    <line class="wire w4" x1="500" y1="280" x2="390" y2="90"/>
    <line class="wire w5" x1="500" y1="280" x2="635" y2="110"/>
    <line class="wire w6" x1="500" y1="280" x2="845" y2="185"/>
    <line class="wire w7" x1="500" y1="280" x2="850" y2="320"/>
    <line class="wire w8" x1="500" y1="280" x2="360" y2="465"/>
    <line class="wire w9" x1="500" y1="280" x2="680" y2="460"/>
  </g>
  <g>
    <line class="flow" x1="500" y1="280" x2="165" y2="165"/>
    <line class="flow" x1="500" y1="280" x2="120" y2="295"/>
    <line class="flow" x1="500" y1="280" x2="175" y2="415"/>
    <line class="flow" x1="500" y1="280" x2="390" y2="90"/>
    <line class="flow" x1="500" y1="280" x2="635" y2="110"/>
    <line class="flow" x1="500" y1="280" x2="845" y2="185"/>
    <line class="flow" x1="500" y1="280" x2="850" y2="320"/>
    <line class="flow" x1="500" y1="280" x2="360" y2="465"/>
    <line class="flow" x1="500" y1="280" x2="680" y2="460"/>
  </g>

  <!-- cluster labels -->
  <text fill="var(--accent)" class="mono pop p10" x="78"  y="110" font-size="10" letter-spacing="3">TERMINAL</text>
  <text fill="var(--accent)" class="mono pop p10" x="340" y="56"  font-size="10" letter-spacing="3">WEB &amp; DATA</text>
  <text fill="var(--accent)" class="mono pop p10" x="845" y="142" font-size="10" letter-spacing="3" text-anchor="middle">iOS NATIVE</text>
  <text fill="var(--accent)" class="mono pop p10" x="440" y="540" font-size="10" letter-spacing="3">FULL-STACK</text>

  <!-- core -->
  <g class="pop p0">
    <rect class="nodeC" x="405" y="252" width="190" height="56" rx="2"/>
    <circle class="core" cx="423" cy="280" r="3.5" fill="var(--accent)"/>
    <text fill="var(--bone)" class="mono" x="438" y="276" font-size="13" letter-spacing="2">SHARANN.SYS</text>
    <text fill="var(--muted)" class="mono" x="438" y="294" font-size="9.5" letter-spacing="1.5">one-person build pipeline</text>
  </g>

  <!-- nodes -->
  <g class="pop p1"><rect class="node" x="90" y="142" width="150" height="46" rx="2"/><text fill="var(--bone)" class="mono" x="104" y="162" font-size="12" letter-spacing="1">cosmos</text><text fill="var(--muted)" class="mono" x="104" y="178" font-size="9" letter-spacing="1">AI chat · 25+ models</text></g>
  <g class="pop p2"><rect class="node" x="45" y="272" width="150" height="46" rx="2"/><text fill="var(--bone)" class="mono" x="59" y="292" font-size="12" letter-spacing="1">terminaltype</text><text fill="var(--muted)" class="mono" x="59" y="308" font-size="9" letter-spacing="1">typing test · live WPM</text></g>
  <g class="pop p3"><rect class="node" x="100" y="392" width="150" height="46" rx="2"/><text fill="var(--bone)" class="mono" x="114" y="412" font-size="12" letter-spacing="1">billing system</text><text fill="var(--muted)" class="mono" x="114" y="428" font-size="9" letter-spacing="1">internship · GeoPacific</text></g>
  <g class="pop p4"><rect class="node" x="315" y="67" width="150" height="46" rx="2"/><text fill="var(--bone)" class="mono" x="329" y="87" font-size="12" letter-spacing="1">kern</text><text fill="var(--muted)" class="mono" x="329" y="103" font-size="9" letter-spacing="1">data OS · MCP server</text></g>
  <g class="pop p5"><rect class="node" x="560" y="87" width="150" height="46" rx="2"/><text fill="var(--bone)" class="mono" x="574" y="107" font-size="12" letter-spacing="1">lobe</text><text fill="var(--muted)" class="mono" x="574" y="123" font-size="9" letter-spacing="1">knowledge OS · web</text></g>
  <g class="pop p6"><rect class="node" x="770" y="162" width="155" height="46" rx="2"/><text fill="var(--bone)" class="mono" x="784" y="182" font-size="12" letter-spacing="1">notionwidgets</text><text fill="var(--muted)" class="mono" x="784" y="198" font-size="9" letter-spacing="1">WidgetKit · Notion API</text></g>
  <g class="pop p7"><rect class="node" x="775" y="297" width="150" height="46" rx="2"/><text fill="var(--bone)" class="mono" x="789" y="317" font-size="12" letter-spacing="1">planner</text><text fill="var(--muted)" class="mono" x="789" y="333" font-size="9" letter-spacing="1">SwiftUI · Core Data</text></g>
  <g class="pop p8"><rect class="node" x="285" y="442" width="150" height="46" rx="2"/><text fill="var(--bone)" class="mono" x="299" y="462" font-size="12" letter-spacing="1">student dashboard</text><text fill="var(--muted)" class="mono" x="299" y="478" font-size="9" letter-spacing="1">VIT · academic tools</text></g>
  <g class="pop p9"><rect class="node" x="605" y="437" width="150" height="46" rx="2"/><text fill="var(--bone)" class="mono" x="619" y="457" font-size="12" letter-spacing="1">landroid</text><text fill="var(--muted)" class="mono" x="619" y="473" font-size="9" letter-spacing="1">drone NDVI · GeoTIFF</text></g>

  <line x1="48" y1="550" x2="952" y2="550" stroke="var(--rule)"/>
  <text fill="var(--dim)" class="mono" x="952" y="572" font-size="10" letter-spacing="2" text-anchor="end">DASHED LINES — DATA IN MOTION</text>
</svg>

<svg viewBox="0 0 1000 92" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Section 03 — PROJECTS">
  <style>
    :root { --rule: #D1D1D1; --muted: #666666; --accent: #0D0D0D; --ghost: #E8E8E8; }
    @media (prefers-color-scheme: dark) {
      :root { --rule: #3C3C3C; --muted: #AAAAAA; --accent: #FFFFFF; --ghost: #2E2E2E; }
    }
    .mono { font-family: "Inter", ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .serif { font-family: "Inter Display", ui-sans-serif, system-ui, -apple-system, sans-serif; }
    .draw { stroke: var(--rule); stroke-width: 1; stroke-dasharray: 760; stroke-dashoffset: 760; animation: d 1.3s cubic-bezier(.6,0,.2,1) .2s forwards; }
    @keyframes d { to { stroke-dashoffset: 0; } }
    .f { opacity: 0; animation: f .8s ease .1s forwards; }
    @keyframes f { to { opacity: 1; } }
    .tick { animation: p 2.4s ease-in-out infinite; }
    @keyframes p { 0%,100%{opacity:1} 50%{opacity:.3} }
    @media (prefers-reduced-motion: reduce) {
      .draw,.f,.tick { animation: none; } .draw { stroke-dashoffset: 0; } .f { opacity: 1; }
    }
  </style>
  <g class="f">
    <text class="serif" x="48" y="68" font-size="52" fill="var(--ghost)" font-style="italic">03</text>
    <text class="mono tick" x="128" y="58" font-size="14" fill="var(--accent)" letter-spacing="6">PROJECTS</text>
    <text class="mono" x="952" y="58" font-size="11" fill="var(--muted)" letter-spacing="2" text-anchor="end">~/03-projects</text>
  </g>
  <line class="draw" x1="278" y1="53" x2="823" y2="53"/>
</svg>
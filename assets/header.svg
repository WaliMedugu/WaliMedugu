<svg viewBox="0 0 900 360" width="900" height="360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Sharann Manojkumar — iOS, Full-Stack and Terminal UI Developer">
  <defs>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .dim  { fill: #6b6b72; }
      .fg   { fill: #f4f4f2; }
      .ok   { fill: #f4f4f2; }
      .name { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, monospace; font-weight: 700; fill: #f7f7f5; letter-spacing: 1.5px; }
    </style>

    <linearGradient id="nameWipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bdbdba"/>
    </linearGradient>

    <!-- typing wipe for "whoami" -->
    <clipPath id="clipWho"><rect x="0" y="0" width="0" height="360">
      <animate attributeName="width" begin="0.35s" dur="0.55s" calcMode="discrete"
        values="0;14;28;42;56;70;84" keyTimes="0;0.16;0.33;0.5;0.66;0.83;1" fill="freeze"/>
    </rect></clipPath>

    <!-- printing wipe for the big name -->
    <clipPath id="clipName"><rect x="0" y="0" width="0" height="360">
      <animate attributeName="width" begin="1.3s" dur="0.7s" values="0;640" fill="freeze"/>
    </rect></clipPath>

    <!-- typing wipe for "cat status.txt" -->
    <clipPath id="clipCat"><rect x="0" y="0" width="0" height="360">
      <animate attributeName="width" begin="2.8s" dur="0.8s" calcMode="discrete"
        values="0;14;28;42;56;70;84;98;112;126;140;154;168;182;196"
        keyTimes="0;0.07;0.14;0.21;0.28;0.35;0.42;0.5;0.57;0.64;0.71;0.78;0.85;0.92;1" fill="freeze"/>
    </rect></clipPath>
  </defs>

  <!-- terminal window (transparent outside it) -->
  <rect x="16" y="16" width="868" height="328" rx="12" fill="#0c0c0e" stroke="#232327" stroke-width="1"/>

  <!-- title bar -->
  <g>
    <path d="M16 28 a12 12 0 0 1 12 -12 h840 a12 12 0 0 1 12 12 v28 h-864 z" fill="#101013"/>
    <line x1="16" y1="56" x2="884" y2="56" stroke="#232327" stroke-width="1"/>
    <circle cx="40" cy="36" r="5" fill="none" stroke="#3a3a40" stroke-width="1.4"/>
    <circle cx="60" cy="36" r="5" fill="none" stroke="#3a3a40" stroke-width="1.4"/>
    <circle cx="80" cy="36" r="5" fill="none" stroke="#3a3a40" stroke-width="1.4"/>
    <text x="450" y="40" text-anchor="middle" class="mono dim" font-size="12.5" letter-spacing="2">— sharann.dev —</text>
  </g>

  <!-- body -->
  <g class="mono" font-size="15">
    <!-- line 1: whoami -->
    <g opacity="0">
      <animate attributeName="opacity" begin="0.2s" dur="0.2s" to="1" fill="freeze"/>
      <text x="46" y="96" class="ok" font-size="15">❯</text>
      <text x="66" y="96" class="dim">sharann@vit</text>
      <text x="170" y="96" class="dim">~</text>
      <text x="184" y="96" class="dim">%</text>
      <g clip-path="url(#clipWho)"><text x="206" y="96" class="fg">whoami</text></g>
    </g>

    <!-- big name (printed output) -->
    <g clip-path="url(#clipName)">
      <text x="46" y="160" class="name" font-size="40" fill="url(#nameWipe)">SHARANN MANOJKUMAR</text>
    </g>

    <!-- subtitle -->
    <text x="48" y="190" class="mono dim" font-size="13.5" opacity="0" letter-spacing="0.4">
      iOS Developer&#160;&#160;·&#160;&#160;Full-Stack Engineer&#160;&#160;·&#160;&#160;Terminal UI Builder
      <animate attributeName="opacity" begin="2.0s" dur="0.5s" to="1" fill="freeze"/>
    </text>

    <!-- line 2: cat status.txt -->
    <g opacity="0">
      <animate attributeName="opacity" begin="2.7s" dur="0.2s" to="1" fill="freeze"/>
      <text x="46" y="236" class="ok" font-size="15">❯</text>
      <text x="66" y="236" class="dim">sharann@vit</text>
      <text x="170" y="236" class="dim">~</text>
      <text x="184" y="236" class="dim">%</text>
      <g clip-path="url(#clipCat)"><text x="206" y="236" class="fg">cat status.txt</text></g>
    </g>

    <!-- status output -->
    <text x="46" y="262" class="mono" font-size="13" fill="#9a9aa0" opacity="0">
      <tspan class="dim">→</tspan>&#160;&#160;Chennai, India&#160;&#160;·&#160;&#160;VIT Chennai · 2024–2028&#160;&#160;·&#160;&#160;iSpace Club
      <animate attributeName="opacity" begin="3.7s" dur="0.4s" to="1" fill="freeze"/>
    </text>
    <text x="46" y="284" class="mono" font-size="13" fill="#9a9aa0" opacity="0">
      <tspan class="dim">→</tspan>&#160;&#160;now building&#160;&#160;<tspan class="fg">Cosmos</tspan>&#160;·&#160;<tspan class="fg">Kern</tspan>&#160;·&#160;<tspan class="fg">Landroid</tspan>&#160;&#160;·&#160; open to internships
      <animate attributeName="opacity" begin="4.0s" dur="0.4s" to="1" fill="freeze"/>
    </text>

    <!-- line 3: live prompt + blinking cursor -->
    <g opacity="0">
      <animate attributeName="opacity" begin="4.5s" dur="0.2s" to="1" fill="freeze"/>
      <text x="46" y="320" class="ok" font-size="15">❯</text>
      <text x="66" y="320" class="dim">sharann@vit</text>
      <text x="170" y="320" class="dim">~</text>
      <text x="184" y="320" class="dim">%</text>
      <rect x="206" y="309" width="9" height="15" fill="#f4f4f2">
        <animate attributeName="opacity" begin="4.7s" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.06s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
</svg>
